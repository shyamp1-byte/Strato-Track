services:
  db:
    platform: linux/amd64
    image: postgres:15
    container_name: strato-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: stratotrack
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d stratotrack"]
      interval: 2s
      timeout: 3s
      retries: 20

  web:
    build: .
    container_name: strato-web
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/stratotrack
      JWT_SECRET: dev-secret
      HF_API_TOKEN: "${HF_API_TOKEN}"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: